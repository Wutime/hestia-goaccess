services:
  dev:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    image: wutime/hestia-goaccess-dev:local
    working_dir: /workspace
    command: scripts/dev-server.sh
    ports:
      - "18080:80"
      - "64000-64010:64000-64010"
  hestia-vps:
    profiles:
      - hestia
    build:
      context: .
      dockerfile: docker/hestia-vps/Dockerfile
    image: wutime/hestia-goaccess-hestia-vps:local
    hostname: panel.hestia-goaccess.localhost
    privileged: true
    cgroup: host
    working_dir: /workspace
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    ports:
      - "18083:8083"
      - "20080:80"
      - "20443:443"
      - "26400-26410:64000-64010"
    environment:
      HESTIA_ADMIN_USER: admin
      HESTIA_ADMIN_PASSWORD: HestiaGoAccess123!
      HESTIA_HOSTNAME: panel.hestia-goaccess.localhost
      HESTIA_EMAIL: admin@example.test
