GOACCESS_KEEP_LAST=90
GOACCESS_REALTIME_BIND=127.0.0.1
GOACCESS_REALTIME_WS_PATH=/vstats/ws/
GOACCESS_REALTIME_WS_URL_TEMPLATE=
