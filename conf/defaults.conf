# hestia-goaccess project defaults

GOACCESS_MIN_VERSION=1.10.2
GOACCESS_PORT_RANGE=64000-64999
GOACCESS_LOG_FORMAT=COMBINED
GOACCESS_FILTER_LOG=/usr/local/share/hestia-goaccess/scripts/hestia-goaccess-filter-log
GOACCESS_IGNORE_PATHS=/vstats/
GOACCESS_HTML_PREFS='{"theme":"darkGray"}'
