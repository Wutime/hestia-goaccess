worker_processes auto;
pid /run/nginx.pid;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	sendfile on;

	server {
		listen 80;
		server_name goaccess.localhost localhost;

		access_log /workspace/docker/fixtures/hestia/var/log/nginx/domains/example.test.log combined;
		error_log /var/log/nginx/hestia-goaccess.error.log warn;

		location / {
			return 302 /vstats/;
		}

		location /vstats/ {
			alias /workspace/docker/fixtures/hestia/home/admin/web/example.test/stats/;
			index index.html;
			try_files $uri $uri/ =404;
		}
	}
}
